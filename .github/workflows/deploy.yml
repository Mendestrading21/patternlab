name: Déploiement web (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Gate complète avant tout déploiement : le site ne part en production que si
      # lint · typecheck · tests · validate:content · release:check ET build:web passent.
      # `npm run check` inclut `build:web`, qui produit `dist/` (l'artefact publié plus bas).
      - name: Gate complète (lint · typecheck · tests · contenu · release · build web)
        run: npm run check
        env:
          EXPO_NO_TELEMETRY: '1'
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
